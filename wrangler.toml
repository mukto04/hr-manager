name = "hr-manager"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "hr-manager-db"
database_id = "8eb09181-24dc-470f-b732-496ccefd62ae"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "hr-manager-storage"
